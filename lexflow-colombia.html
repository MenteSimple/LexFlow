0 productos por $200 millones en cuotas mensuales. Los dos problemas más serios: 1) no dice cuándo se entregan los productos (¡sin fecha de entrega!), y 2) los $200 millones no se ajustan con la inflación, lo que significa que el vendedor pierde poder adquisitivo durante el año de pago."},"Contrato de Arrendamiento":{score:74,matrix:[{clause:"Art. 7 – Mejoras y Adiciones",risk:"alto",obs:"Cláusula inequitativa. No distingue mejoras necesarias, útiles y voluptuarias (Art. 1994 C.C.). El arrendatario puede perder inversiones significativas."},{clause:"Art. 8 – Restitución Anticipada",risk:"medio",obs:"Penalidad válida pero debe precisar si aplica únicamente al incumplimiento del arrendatario o también a terminación bilateral."},{clause:"Art. 3 – Canon y Pagos",risk:"bajo",obs:"Plazo de pago correcto (primeros 5 días). Acorde con la práctica comercial colombiana."},{clause:"Art. 4 – Incremento IPC+2",risk:"bajo",obs:"Ajuste de canon por IPC+2 es válido para uso comercial (L. 820/2003 solo limita incrementos en vivienda)."}],redlines:[{clause:"Art. 7 – Mejoras",risk:"alto",original:"Cualquier mejora o adición al inmueble quedará a favor del ARRENDADOR sin compensación.",suggested:"Las mejoras necesarias (Art. 1993 C.C.) serán reembolsadas por el ARRENDADOR. Las mejoras útiles quedarán a favor del ARRENDADOR previo avalúo acordado por las partes. Las mejoras voluptuarias podrán ser retiradas por el ARRENDATARIO sin deterioro del inmueble."},{clause:"Art. 8 – Restitución Anticipada",risk:"medio",original:"En caso de restitución anticipada sin justa causa, el ARRENDATARIO pagará los cánones pendientes hasta la terminación del plazo.",suggested:"En caso de restitución anticipada imputable exclusivamente al ARRENDATARIO, este pagará como indemnización el equivalente a TRES (3) cánones de arrendamiento, sin perjuicio de los cánones causados hasta la fecha de restitución efectiva."}],ndaCheck:null,simple:"Es un contrato para arrendar una oficina por 24 meses a $8.5 millones al mes. El mayor riesgo: si la empresa hace reformas en la oficina (pinturas, instalaciones, divisiones), pierde todo ese dinero invertido cuando se vaya, porque el arrendador se queda con todo sin pagar nada. En lo demás es un contrato bastante equilibrado."},"Contrato Laboral":{score:55,matrix:[{clause:"Art. 3 – Jornada de Trabajo",risk:"alto",obs:"10 horas diarias excede la jornada máxima de 8 horas (CST Art. 161). Las 2 horas extra deben pagarse con recargo del 25% diurno o 75% nocturno (Art. 168 CST)."},{clause:"Art. 5 – Período de Prueba",risk:"alto",obs:"4 meses excede el máximo legal de 2 meses para contratos indefinidos (CST Art. 78). Esta cláusula es nula de pleno derecho."},{clause:"Art. 7 – Exclusividad",risk:"medio",obs:"Válida durante el contrato, pero la redacción amplia puede interpretarse como restricción al libre ejercicio profesional. Precisar alcance y sector."},{clause:"Art. 6 – Confidencialidad",risk:"bajo",obs:"Válida. Se recomienda precisar el período post-terminación (usualmente 1–2 años)."},{clause:"Art. 8 – Vacaciones",risk:"bajo",obs:"15 días hábiles correcto (CST Art. 186). Conforme a derecho."}],redlines:[{clause:"Art. 3 – Jornada",risk:"alto",original:"La jornada será de lunes a viernes de 8:00 a.m. a 6:00 p.m. (10 horas diarias).",suggested:"La jornada ordinaria será de lunes a viernes de 8:00 a.m. a 5:00 p.m. (8 horas diarias con 1 hora de almuerzo). El trabajo adicional a la jornada ordinaria se reconocerá como horas extras con los recargos establecidos en el Art. 168 del CST."},{clause:"Art. 5 – Período de Prueba",risk:"alto",original:"Las partes acuerdan un período de prueba de 4 meses.",suggested:"Las partes acuerdan un período de prueba de DOS (2) meses, conforme al artículo 78 del Código Sustantivo del Trabajo, aplicable a contratos a término indefinido."},{clause:"Art. 7 – Exclusividad",risk:"medio",original:"El TRABAJADOR no podrá prestar servicios a competidores directos durante la vigencia del contrato.",suggested:"Durante la vigencia del contrato, el TRABAJADOR se abstendrá de prestar servicios a empresas que desarrollen actividades directamente competidoras en el mismo mercado geográfico y segmento de producto. Esta restricción no limita el ejercicio de actividades profesionales en sectores distintos al del EMPLEADOR."}],ndaCheck:null,simple:"Este contrato tiene dos problemas legales graves: 1) La jornada de 10 horas al día viola el límite de 8 horas que fija el Código del Trabajo — las 2 horas extra deben pagarse con recargo, y 2) el período de prueba de 4 meses está prohibido; la ley solo permite máximo 2 meses. Estas cláusulas son nulas y el trabajador podría reclamar diferencias ante el Ministerio de Trabajo."},"Contrato de Servicios":{score:79,matrix:[{clause:"Art. 6 – Propiedad Intelectual",risk:"medio",obs:"La cesión de PI es válida pero debe especificar: tipo de derechos cedidos, territorio, vigencia y si incluye versiones futuras (Ley 23/1982)."},{clause:"Art. 7 – Confidencialidad Post-Contractual",risk:"bajo",obs:"2 años post-terminación es adecuado. Se recomienda incluir cláusula penal específica para el incumplimiento de esta obligación."},{clause:"Art. 4 – Autonomía del Contratista",risk:"bajo",obs:"Correctamente redactado para evitar subordinación laboral. Importante para evitar reclasificación como contrato laboral (CST Art. 23)."}],redlines:[{clause:"Art. 6 – PI (precisión)",risk:"medio",original:"Todos los entregables y desarrollos pertenecerán al CONTRATANTE.",suggested:"El CONTRATISTA cede al CONTRATANTE, de forma exclusiva, irrevocable y a nivel mundial, todos los derechos patrimoniales de autor sobre los entregables, incluyendo reproducción, transformación, distribución y comunicación pública (Ley 23/1982). Los derechos morales permanecen en el CONTRATISTA conforme al Art. 30 de dicha ley."},{clause:"Art. 7 – Sanción por incumplimiento",risk:"bajo",original:"El CONTRATISTA guardará reserva sobre la información del CONTRATANTE durante la vigencia y por 2 años posteriores.",suggested:"El CONTRATISTA guardará reserva durante la vigencia y por DOS (2) años adicionales. El incumplimiento de esta obligación dará lugar al pago de una pena convencional de CINCUENTA (50) SMMLV, sin perjuicio de los perjuicios adicionales que se acrediten."}],ndaCheck:null,simple:"Contrato de consultoría de 6 meses a $12 millones mensuales. En general está bien redactado y equilibrado. El único punto a mejorar es la cláusula de propiedad intelectual: dice que todo pertenece al contratante, pero no especifica qué tipo de derechos ni en qué territorio. La ley colombiana exige ser específico cuando se ceden derechos de autor sobre obras creadas por encargo."}},Bq=[{id:"T-025/04",tipo:"T",corte:"Constitucional",fecha:"2004-01-22",tema:"Estado de cosas inconstitucional – Población desplazada",magistrado:"Manuel José Cepeda Espinosa",ratio:'La Corte declaró el "estado de cosas inconstitucional" ante la sistemática vulneración de los derechos fundamentales de la población en situación de desplazamiento forzado. Ordenó a más de 40 entidades del Estado adoptar medidas coordinadas para superar el bloqueo institucional. Subregla: Cuando una violación masiva y estructural de derechos afecta a un número amplio de personas que no poseen recursos judiciales efectivos, el juez constitucional puede impartir órdenes complejas que comprometan el diseño y ejecución de políticas públicas, con seguimiento periódico de su cumplimiento.',cita_apa:"Corte Constitucional de Colombia. (2004, enero 22). Sentencia T-025 de 2004. M.P. Manuel José Cepeda Espinosa.",cita_legal:"Corte Constitucional, Sentencia T-025 de 2004, M.P. Manuel José Cepeda Espinosa, 22 de enero de 2004."},{id:"C-355/06",tipo:"C",corte:"Constitucional",fecha:"2006-05-10",tema:"Despenalización parcial del aborto – Tres causales constitucionales",magistrado:"Jaime Araújo Rentería",ratio:"Declaró la inexequibilidad parcial del artículo 122 del Código Penal. Subregla: No se incurre en el delito de aborto cuando la conducta se realiza con consentimiento de la mujer en tres causales: (i) cuando la continuación del embarazo constituya peligro para la vida o la salud de la madre, certificado por médico; (ii) cuando exista grave malformación del feto que haga inviable su vida extrauterina, certificada por médico; y (iii) cuando el embarazo sea resultado de conducta debidamente denunciada constitutiva de acceso carnal violento, inseminación artificial no consentida, o transferencia de óvulo fecundado no consentida.",cita_apa:"Corte Constitucional de Colombia. (2006, mayo 10). Sentencia C-355 de 2006. M.P. Jaime Araújo Rentería y Clara Inés Vargas Hernández.",cita_legal:"Corte Constitucional, Sentencia C-355 de 2006, M.P. Jaime Araújo Rentería, 10 de mayo de 2006."},{id:"SU-420/19",tipo:"SU",corte:"Constitucional",fecha:"2019-09-11",tema:"Estabilidad laboral reforzada – Debilidad manifiesta por razones de salud",magistrado:"José Fernando Reyes Cuartas",ratio:"Unificó la jurisprudencia sobre estabilidad laboral reforzada por razones de salud. Subregla: La protección aplica a todo trabajador cuya condición física, sensorial o psicológica sea causa determinante de la terminación del contrato, sin que sea necesaria una calificación previa de pérdida de capacidad laboral moderada, severa o profunda. Basta con que el empleador conozca o deba conocer la condición del trabajador al momento del despido. El empleador que prescinda de la autorización del Ministerio del Trabajo debe reconocer indemnización especial de 180 días de salario, adicional a las prestaciones legales.",cita_apa:"Corte Constitucional de Colombia. (2019, septiembre 11). Sentencia SU-420 de 2019. M.P. José Fernando Reyes Cuartas.",cita_legal:"Corte Constitucional, Sentencia SU-420 de 2019, M.P. José Fernando Reyes Cuartas, 11 de septiembre de 2019."}],vs=[{id:"T-571/92",label:"Sentencia Fundadora",year:"1992",color:"#8b5cf6",titulo:"Primera protección laboral por estado de salud",desc:"La Corte reconoce por primera vez que el estado de salud de un trabajador genera una obligación constitucional de protección especial. Establece que el derecho al trabajo incluye la estabilidad para personas en condición de debilidad manifiesta, inaugurando la línea jurisprudencial."},{id:"T-198/06",label:"Sentencia Hito",year:"2006",color:"#3b82f6",titulo:"Consolidación del fuero de salud",desc:"Consolida la doctrina: el empleador no puede dar por terminado el contrato sin autorización del Ministerio del Trabajo cuando conoce la condición de salud del trabajador. Define el concepto operativo de 'debilidad manifiesta' como elemento activador de la protección reforzada."},{id:"SU-420/19",label:"Sentencia Unificadora",year:"2019",color:"#22c55e",titulo:"Unificación definitiva – Criterio vinculante",desc:"Cierra los debates doctrinarios. La protección no requiere calificación de PCL. Fija la indemnización especial de 180 días de salario y unifica el precedente para todas las salas de revisión de tutelas, con efecto vinculante erga omnes."}],Fq=["Todos","Constitucional","Suprema de Justicia","Consejo de Estado"],Uq=["Todos","2024","2023","2022","2021","2020","2019","2010–2019","2000–2009"],Wq=["Todos","Manuel José Cepeda","Jaime Araújo Rentería","José Fernando Reyes","Jorge Iván Palacio","Alejandro Linares","Diana Fajardo","Gloria Stella Ortiz"],Hq=[{id:"f1",doc:"Contrato Prestación de Servicios — TechSoft S.A.S.",destinatarios:["jlopez@techsoft.com.co","mgarcia@techsoft.com.co"],estado:"pendiente",enviado:"03 Mar 2025",vence:"10 Mar 2025"},{id:"f2",doc:"NDA — Grupo Constructor Alianza Ltda.",destinatarios:["contratos@alianza.co"],estado:"firmado",enviado:"28 Feb 2025",vence:"07 Mar 2025"},{id:"f3",doc:"Otrosí No. 2 — Contrato Arrendamiento Local 4B",destinatarios:["p.hernandez@gmail.com","renta@lexflow.co"],estado:"vencido",enviado:"15 Feb 2025",vence:"22 Feb 2025"},{id:"f4",doc:"Contrato Laboral — Ingrid Sofía Vargas Ruiz",destinatarios:["ivargas@empresa.co"],estado:"pendiente",enviado:"04 Mar 2025",ven
